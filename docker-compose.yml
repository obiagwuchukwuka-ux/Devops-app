services:
  web:
    build: .
    container_name: devops-next-web
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: devops-next-nginx
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
