server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        proxy_pass http://web:3000/api/health;
    }
}

# For real HTTPS, add Let's Encrypt certificates and create a 443 server block.
# For local HTTPS practice, generate self-signed certificates into nginx/certs.
